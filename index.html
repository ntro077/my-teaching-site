<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Teacher Rush | Expert English Coach</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #1A365D; 
            --accent-yellow: #FFD700;
            --white: #FFFFFF;
            --text-dark: #1A202C;
            --whatsapp-green: #25D366;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; color: var(--text-dark); background-color: var(--white); scroll-behavior: smooth; }
        
        /* Main Header Section */
        header { 
            background: linear-gradient(135deg, var(--primary-blue) 0%, #2A4365 100%); 
            color: var(--white); 
            padding: 80px 20px; 
            text-align: center; 
        }

        h1 { font-size: 2.8rem; margin: 0; }
        .tagline { font-size: 1.2rem; color: var(--accent-yellow); margin: 15px 0 40px; }
        
        /* The Three Main Buttons Side-by-Side */
        .cta-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap; /* Keeps it looking good on mobile */
            max-width: 900px;
            margin: 0 auto;
        }

        .btn {
            padding: 14px 24px;
            border-radius: 8px;
            font-weight: bold;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: inline-block;
            min-width: 160px;
            text-align: center;
        }

        /* Specific Button Colors */
        .btn-preply { background: var(--accent-yellow); color: var(--primary-blue); border: 2px solid var(--accent-yellow); }
        .btn-whatsapp { background: var(--whatsapp-green); color: white; border: 2px solid var(--whatsapp-green); }
        .btn-insta { background: transparent; color: white; border: 2px solid white; }

        .btn:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.3); opacity: 0.9; }

        /* General Content Styling */
        .container { max-width: 800px; margin: auto; padding: 60px 20px; text-align: center; }
        .about-text { line-height: 1.8; font-size: 1.1rem; color: #4A5568; }

        /* Secondary Social Section */
        .social-links { margin-top: 40px; display: flex; justify-content: center; gap: 20px; }
        .social-links a { color: var(--primary-blue); text-decoration: none; font-weight: bold; font-size: 0.9rem; border-bottom: 2px solid var(--accent-yellow); }

        footer { padding: 40px; color: #A0AEC0; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <h1>English Teacher Rush</h1>
        <p class="tagline">Over 4 Years Experience Helping Students in Brazil Reach Fluency</p>
